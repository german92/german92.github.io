<!-- Team Section -->
    <section id="team" class="bg-light-gray">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="section-heading">One Man Team</h2>
                    <h3 class="section-subheading text-muted">Tech and Business backgrounds to tackle any project.</h3>
                </div>
            </div>
            <div class="row">
                {% for member in site.people %}
                <!-- <div class="col-sm-4">  When more people are added to team uncomment and delete line below-->
                <div class="col">
                    <div class="team-member">
                        <img src="img/team/{{ member.pic }}.jpg" class="img-responsive img-circle" alt="">
                        <h4>{{ member.name }}</h4>
                        <p class="text-muted">{{ member.position }}</p>
                        <ul class="list-inline social-buttons">
                            {% for network in member.social %}
                            <li>
                                <a href="{{ network.url }}">
                                    <i class="fa fa-{{ network.title }}"></i>
                                </a>
                            </li>
                            {% endfor %}

                        </ul>
                    </div>
                </div>
                {% endfor %}
            </div>
            <div class="row">
                <div class="col-lg-8 col-lg-offset-2 text-center">
                    <p class="large text-muted">I love working with other people! Contact me if you want to be part of my team.</p>
                </div>
            </div>
        </div>
    </section>
